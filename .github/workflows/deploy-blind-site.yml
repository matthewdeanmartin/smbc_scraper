name: Deploy Blind SMBC Site to GH Pages

on:
  push:
    branches:
      - main
    paths:
      - 'blind_smbc/**'
      - 'gold_data/smbc_ground_truth.csv'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Generate site
        run: |
          cd blind_smbc
          uv run python generator.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./blind_smbc/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
